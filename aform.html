<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="aform.css">
  </head>
  <body>
    <div class="form-container position-absolute top-50 start-50 translate-middle">
        <form action="#" mehtod="post">
            <h6>개인정보 입력</h6>
            <hr> <br>
            <div class="mb-3">
              <pre>학번 <input type="text" name="snum" placeholder="학번 입력"></pre>
            </div> <br>
            <div class="mb-3">
              <pre>이름 <input type="text" name="name" placeholder="이름 입력"></pre>
            </div> <br>
            <div class="mb-3">
              <pre>성별 여 <input type="checkbox" name="gender"> 남 <input type="checkbox" name="gender"></pre>
            </div> <br>
            <div class="mb-3">
              <pre>기숙사 여부 기숙사 <input type="checkbox" name="dormi"> 통학 <input type="checkbox" name="dormi"></pre>
            </div> <br>
            <div class="mb-3">
              <pre>기숙사 호실 <input type="text" name="dnum" placeholder="기숙사 호실 입력"></pre>
            </div> <br>
            <div class="mb-3">
              <pre>전화번호 <input type="text" name="pnum" placeholder="010"> <input type="text" name="pnum"> <input type="text" name="pnum"></pre>
            </div> <br>
            <h6>지원내용</h6>
            <hr> <br>
            <div class="mb-3">
              지원동기 <br>
             <pre>(300자 이내)  <input type="text" name="moap" placeholder="지원동기 입력"></pre>
            </div>
         </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
